name: Build – Windows

on:
  push:
    branches: ["main", "release/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows MSIX
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache GGUF models
        id: model-cache
        uses: actions/cache@v4
        with:
          path: assets/models
          key: models-gemma4-e2b-v1

      - name: Download GGUF models (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/download_models.sh

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create MSIX
        # continue-on-error so a signing/cert failure never blocks the exe upload.
        # msix_config in pubspec.yaml sets sign_msix: false to avoid interactive prompts.
        continue-on-error: true
        run: dart run msix:create --no-sign

      - name: Bundle required DLLs (vcomp140, vulkan-1)
        shell: pwsh
        run: |
          # nobodywho_flutter.dll is a Rust + llama.cpp MSVC binary compiled with
          # two non-standard dependencies that are NOT in the system PATH on clean
          # Windows installs:
          #
          #   vcomp140.dll  — MSVC OpenMP runtime (not part of the VC++ Redist)
          #   vulkan-1.dll  — Vulkan Loader (installed by GPU drivers; absent on
          #                   machines without a discrete GPU or fresh OS)
          #
          # Both are redistributable (Apache 2.0 / MSVC REDIST SUPPLEMENT).
          # We bundle them so the app starts on any Windows 10/11 machine.
          # On machines without a GPU, llama.cpp falls back to CPU automatically.

          $dest = "build\windows\x64\runner\Release"

          # ── vcomp140.dll ─────────────────────────────────────────────────────
          # Prefer the Redist x64 copy; fall back to System32.
          $vcDll = Get-ChildItem `
            "C:\Program Files\Microsoft Visual Studio\2022" `
            -Recurse -Filter "vcomp140.dll" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch "(?i)(arm|x86[^_]|amd64_x86)" } |
            Select-Object -First 1

          if (-not $vcDll) {
            $vcDll = Get-Item "C:\Windows\System32\vcomp140.dll" -ErrorAction SilentlyContinue
          }

          if ($vcDll) {
            Copy-Item $vcDll.FullName $dest
            Write-Host "Bundled vcomp140.dll from: $($vcDll.FullName)"
          } else {
            Write-Error "vcomp140.dll not found — nobodywho will fail to load."
            exit 1
          }

          # ── vulkan-1.dll ──────────────────────────────────────────────────────
          # nobodywho_flutter.dll is compiled with the 'vulkan' llama.cpp feature
          # (see nobodywho core/Cargo.toml) for GPU-accelerated inference.
          # That creates a hard import of vulkan-1.dll at load time.
          #
          # We download the tiny (~1 MB) Vulkan Runtime installer from LunarG and
          # install it silently; it drops vulkan-1.dll into System32.  The Vulkan
          # Loader (Apache 2.0) gracefully reports zero physical devices when no
          # GPU driver is present, so CPU fallback still works.
          $vkVersion  = "1.3.296.0"
          $vkRTUrl    = "https://sdk.lunarg.com/sdk/download/$vkVersion/windows/VulkanRT-$vkVersion-Installer.exe"
          Write-Host "Downloading Vulkan Runtime $vkVersion..."
          Invoke-WebRequest -Uri $vkRTUrl -OutFile VulkanRT.exe -UseBasicParsing
          Write-Host "Installing Vulkan Runtime (silent)..."
          Start-Process VulkanRT.exe -ArgumentList "/S" -Wait

          $vkDll = Get-Item "C:\Windows\System32\vulkan-1.dll" -ErrorAction SilentlyContinue
          if ($vkDll) {
            Copy-Item $vkDll.FullName $dest
            Write-Host "Bundled vulkan-1.dll from: $($vkDll.FullName)"
          } else {
            Write-Error "vulkan-1.dll not found after Vulkan Runtime install."
            exit 1
          }

      - name: Upload exe bundle
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-exe
          # Full Release folder: luna_flutter.exe + all required DLLs + bundled models
          path: build\windows\x64\runner\Release\
          if-no-files-found: error

      - name: Upload exe bundle (no models — fast download for testing)
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-exe-no-models
          # Same Release folder but with the large GGUF model files excluded.
          # The app will start but show "⚠️ No model loaded." until models are
          # placed in data\flutter_assets\assets\models\ next to the exe.
          path: |
            build\windows\x64\runner\Release\
            !build\windows\x64\runner\Release\data\flutter_assets\assets\models\**
          if-no-files-found: error

      - name: Upload MSIX (if created)
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-msix
          path: build\windows\x64\runner\Release\luna_flutter.msix
          if-no-files-found: ignore
