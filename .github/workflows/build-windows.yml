name: Build – Windows

on:
  push:
    branches: ["main", "release/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows MSIX
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache GGUF models
        id: model-cache
        uses: actions/cache@v4
        with:
          path: assets/models
          key: models-gemma4-e2b-v1

      - name: Download GGUF models (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/download_models.sh

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create MSIX
        # continue-on-error so a signing/cert failure never blocks the exe upload.
        # msix_config in pubspec.yaml sets sign_msix: false to avoid interactive prompts.
        continue-on-error: true
        run: dart run msix:create --no-sign

      - name: Bundle vcomp140.dll (OpenMP runtime)
        shell: pwsh
        run: |
          # nobodywho_flutter.dll links against vcomp140.dll (the MSVC OpenMP runtime).
          # Flutter does not bundle it automatically and it is not in the standard
          # VC++ Redistributable, so we copy it from the VS 2022 installation here.
          $dest = "build\windows\x64\runner\Release"

          # Prefer the x64 redistribution copy inside VS; fall back to System32.
          $dll = Get-ChildItem `
            "C:\Program Files\Microsoft Visual Studio\2022" `
            -Recurse -Filter "vcomp140.dll" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch "(?i)(arm|x86[^_]|amd64_x86)" } |
            Select-Object -First 1

          if (-not $dll) {
            $dll = Get-Item "C:\Windows\System32\vcomp140.dll" -ErrorAction SilentlyContinue
          }

          if ($dll) {
            Copy-Item $dll.FullName $dest
            Write-Host "Bundled vcomp140.dll from: $($dll.FullName)"
          } else {
            Write-Error "vcomp140.dll not found on this runner — nobodywho will fail to load on machines without VS OpenMP installed."
            exit 1
          }

      - name: Upload exe bundle
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-exe
          # Full Release folder: luna_flutter.exe + all required DLLs + bundled models
          path: build\windows\x64\runner\Release\
          if-no-files-found: error

      - name: Upload exe bundle (no models — fast download for testing)
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-exe-no-models
          # Same Release folder but with the large GGUF model files excluded.
          # The app will start but show "⚠️ No model loaded." until models are
          # placed in data\flutter_assets\assets\models\ next to the exe.
          path: |
            build\windows\x64\runner\Release\
            !build\windows\x64\runner\Release\data\flutter_assets\assets\models\**
          if-no-files-found: error

      - name: Upload MSIX (if created)
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-msix
          path: build\windows\x64\runner\Release\luna_flutter.msix
          if-no-files-found: ignore
