name: Build – Windows

on:
  push:
    branches: ["main", "release/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows MSIX
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create MSIX
        # continue-on-error so a signing/cert failure never blocks the exe upload.
        # msix_config in pubspec.yaml sets sign_msix: false to avoid interactive prompts.
        continue-on-error: true
        run: dart run msix:create --no-sign

      - name: Upload exe bundle
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-exe
          # Full Release folder: luna_flutter.exe + all required DLLs
          path: build\windows\x64\runner\Release\
          if-no-files-found: error

      - name: Upload MSIX (if created)
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-msix
          path: build\windows\x64\runner\Release\luna_flutter.msix
          if-no-files-found: ignore
