name: Build – Windows

on:
  push:
    branches: ["main", "release/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows MSIX
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache GGUF models
        id: model-cache
        uses: actions/cache@v4
        with:
          path: assets/models
          key: models-gemma4-e2b-v1

      - name: Download GGUF models (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/download_models.sh

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create MSIX
        # continue-on-error so a signing/cert failure never blocks the exe upload.
        # msix_config in pubspec.yaml sets sign_msix: false to avoid interactive prompts.
        continue-on-error: true
        run: dart run msix:create --no-sign

      - name: Install Vulkan SDK
        # The windows-2022 runner image no longer ships the Vulkan SDK, so we
        # install it explicitly here.  The humbletim action downloads only the
        # Loader + Headers components (not the full SDK), sets VULKAN_SDK, and
        # caches the download for subsequent runs.
        uses: humbletim/setup-vulkan-sdk@v1.2.0
        with:
          vulkan-query-version: 1.3.204.0
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Bundle required DLLs (OpenMP + Vulkan)
        shell: pwsh
        run: |
          # nobodywho_flutter.dll is a Rust/llama.cpp MSVC binary with two
          # non-standard runtime DLLs that are NOT present on a clean Windows PATH:
          #
          #   vcomp140.dll — MSVC OpenMP runtime (not in the standard VC++ Redist)
          #   vulkan-1.dll — Vulkan Loader (normally installed by GPU drivers)
          #
          # Both are redistributable.  On machines without a discrete GPU the Vulkan
          # Loader returns zero physical devices and llama.cpp uses CPU inference.
          $dest = "build\windows\x64\runner\Release"

          # ── vcomp140.dll ─────────────────────────────────────────────────────
          # Copied from the VS 2022 Redist folder already present on this runner.
          $vcDll = Get-ChildItem `
            "C:\Program Files\Microsoft Visual Studio\2022" `
            -Recurse -Filter "vcomp140.dll" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch "(?i)(arm|x86[^_]|amd64_x86)" } |
            Select-Object -First 1

          if (-not $vcDll) {
            $vcDll = Get-Item "C:\Windows\System32\vcomp140.dll" -ErrorAction SilentlyContinue
          }
          if ($vcDll) {
            Copy-Item $vcDll.FullName $dest
            Write-Host "Bundled vcomp140.dll from: $($vcDll.FullName)"
          } else {
            Write-Error "vcomp140.dll not found."; exit 1
          }

          # ── vulkan-1.dll ──────────────────────────────────────────────────────
          # nobodywho_flutter.dll is compiled with the 'vulkan' llama.cpp feature
          # (see nobodywho core/Cargo.toml), which creates a hard DLL import of
          # vulkan-1.dll at load time.  The Vulkan SDK is pre-installed on GitHub-
          # hosted windows-2022 runners; its path is in the VULKAN_SDK env var.
          $vkDll = $null
          if ($env:VULKAN_SDK) {
            $vkDll = Get-Item "$env:VULKAN_SDK\Bin\vulkan-1.dll" -ErrorAction SilentlyContinue
            if (-not $vkDll) {
              $vkDll = Get-ChildItem $env:VULKAN_SDK -Recurse -Filter "vulkan-1.dll" `
                -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -notmatch "32" } |
                Select-Object -First 1
            }
          }
          if (-not $vkDll) {
            $vkDll = Get-ChildItem "C:\VulkanSDK" -Recurse -Filter "vulkan-1.dll" `
              -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -notmatch "32" } |
              Select-Object -First 1
          }
          if (-not $vkDll) {
            $vkDll = Get-Item "C:\Windows\System32\vulkan-1.dll" -ErrorAction SilentlyContinue
          }
          if ($vkDll) {
            Copy-Item $vkDll.FullName $dest
            Write-Host "Bundled vulkan-1.dll from: $($vkDll.FullName)"
          } else {
            Write-Error "vulkan-1.dll not found — install the Vulkan SDK on this runner."
            exit 1
          }

      - name: Upload exe bundle
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-exe
          # Full Release folder: luna_flutter.exe + all required DLLs + bundled models
          path: build\windows\x64\runner\Release\
          if-no-files-found: error

      - name: Upload exe bundle (no models — fast download for testing)
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-exe-no-models
          # Same Release folder but with the large GGUF model files excluded.
          # The app will start but show "⚠️ No model loaded." until models are
          # placed in data\flutter_assets\assets\models\ next to the exe.
          path: |
            build\windows\x64\runner\Release\
            !build\windows\x64\runner\Release\data\flutter_assets\assets\models\**
          if-no-files-found: error

      - name: Upload MSIX (if created)
        uses: actions/upload-artifact@v4
        with:
          name: luna-windows-x64-msix
          path: build\windows\x64\runner\Release\luna_flutter.msix
          if-no-files-found: ignore
