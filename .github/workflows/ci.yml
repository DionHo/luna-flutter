name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fatal-infos)
        run: flutter analyze --fatal-infos

      - name: Run unit & widget tests
        # Only run tests that do not need the nobodywho native library or model
        # files.  The inference tests are in a separate step below.
        run: flutter test --coverage test/widget_test.dart test/model_bootstrap_path_test.dart

      - name: Resolve nobodywho native library for tests
        # flutter test does NOT invoke cmake, so the nobodywho binary resolver
        # never runs and libnobodywho_flutter.so is not on the library path.
        # Download it directly from the same GitHub release used by the plugin
        # and expose it via LD_LIBRARY_PATH in the inference test step.
        run: |
          NOBODYWHO_DIR=$(find "$HOME/.pub-cache/hosted/pub.dev" -maxdepth 1 \
            -name "nobodywho-*" -type d | sort -V | tail -1)
          VERSION=$(basename "$NOBODYWHO_DIR" | sed 's/nobodywho-//')
          echo "nobodywho version: $VERSION"
          URL="https://github.com/nobodywho-ooo/nobodywho/releases/download/nobodywho-flutter-v${VERSION}/libnobodywho-flutter-x86_64-unknown-linux-gnu-release.so"
          echo "Downloading: $URL"
          mkdir -p /tmp/nobodywho-lib
          curl -fL -o /tmp/nobodywho-lib/libnobodywho_flutter.so "$URL"
          echo "Installed to: /tmp/nobodywho-lib/libnobodywho_flutter.so"

      - name: Cache GGUF models
        id: model-cache
        uses: actions/cache@v4
        with:
          path: assets/models
          key: models-gemma4-e2b-v1

      - name: Download GGUF models (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: bash scripts/download_models.sh

      - name: Run model inference tests (text + audio)
        env:
          # Make libnobodywho_flutter.so discoverable via DynamicLibrary.open.
          LD_LIBRARY_PATH: /tmp/nobodywho-lib
        run: |
          flutter test \
            test/text_inference_test.dart \
            test/audio_inference_test.dart \
            test/model_bootstrap_path_test.dart \
            --reporter=compact
