name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fatal-infos)
        run: flutter analyze --fatal-infos

      - name: Run unit & widget tests
        run: flutter test --coverage --exclude-tags=requires-models

      - name: Cache GGUF models
        id: model-cache
        uses: actions/cache@v4
        with:
          path: assets/models
          key: models-gemma4-e2b-v1

      - name: Download GGUF models (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: bash scripts/download_models.sh

      - name: Run model inference tests (text + audio)
        run: |
          flutter test \
            test/text_inference_test.dart \
            test/audio_inference_test.dart \
            test/model_bootstrap_path_test.dart \
            --reporter=compact
