name: luna_flutter
description: "Offline-capable AI voice assistant powered by Gemma 4 E2B and Kokoro TTS."
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # LLM inference — llama.cpp wrapper
  nobodywho: ^1.0.0

  # On-device TTS
  kokoro_tts_flutter: ^0.2.0+1

  # State management
  flutter_riverpod: ^2.5.0

  # Local database (conversation persistence)
  sqflite: ^2.3.0

  # Platform file system paths
  path_provider: ^2.1.0

  # Audio playback
  audioplayers: ^6.0.0

  # Lightweight key-value settings
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/   # Placeholder directory; actual models are user-supplied at runtime
