name: luna_flutter
description: "Offline-capable AI voice assistant powered by Gemma 4 E2B and Kokoro TTS."
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  # Audio playback
  audioplayers: ^6.0.0

  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Markdown rendering for LLM responses (streaming-aware)
  gpt_markdown: ^1.1.5

  # On-device TTS
  kokoro_tts_flutter: ^0.2.0+1

  # LLM inference — llama.cpp wrapper (v1.1.0+ required for Encoder/CrossEncoder RAG API)
  nobodywho: ^1.1.0

  # File path helpers (used with path_provider)
  path: ^1.9.0

  # Platform file system paths
  path_provider: ^2.1.0

  # Audio recording (microphone input for push-to-talk)
  record: ^6.0.0

  # Lightweight key-value settings
  shared_preferences: ^2.2.0

  # Local database (conversation persistence)
  sqflite: ^2.3.0

  # FFI-based sqflite backend required on Windows and Linux desktop
  sqflite_common_ffi: ^2.3.0

dev_dependencies:
  flutter_lints: ^4.0.0

  flutter_test:
    sdk: flutter

  # Windows MSIX packaging
  msix: ^3.16.7

flutter:
  uses-material-design: true

  assets:
    - assets/models/   # Bundled GGUF models (downloaded via scripts/download_models.sh)

msix_config:
  display_name: Luna
  publisher_display_name: Luna
  identity_name: com.luna.luna_flutter
  # Do not sign with a test certificate — avoids interactive prompts in CI.
  # For a signed release, set sign_msix: true and supply a real .pfx via
  # the WINDOWS_PFX_BASE64 / WINDOWS_PFX_PASSWORD GitHub secrets.
  sign_msix: false
  output_path: build\windows\x64\runner\Release
